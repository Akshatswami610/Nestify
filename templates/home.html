{% extends 'base.html' %}

{% block title %}Nestify – Find Your Perfect PG{% endblock %}

{% block extra_head %}
<style>
  /* ── HERO ── */
  .hero {
    background: linear-gradient(145deg, #1a1a2e 0%, #16213e 55%, #0f3460 100%);
    padding: 100px 32px 88px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* Animated background orbs */
  .hero::before, .hero::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }
  .hero::before {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,90,95,.18) 0%, transparent 70%);
    top: -100px; left: 50%;
    transform: translateX(-50%);
    animation: orbFloat 8s ease-in-out infinite;
  }
  .hero::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(79,70,229,.12) 0%, transparent 70%);
    bottom: -60px; right: 10%;
    animation: orbFloat 10s ease-in-out infinite reverse;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%       { transform: translateX(-50%) translateY(-20px); }
  }

  /* Floating dots pattern */
  .hero-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .hero-content { position: relative; z-index: 1; }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: .75rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--coral);
    background: rgba(255,90,95,.12);
    border: 1px solid rgba(255,90,95,.28);
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 24px;
    animation: fadeUp .6s var(--ease) .1s both;
  }
  .hero-eyebrow::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--coral);
    border-radius: 50%;
    animation: pulse-dot 2s ease infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: .5; transform: scale(.7); }
  }

  .hero h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2.4rem, 5.5vw, 3.9rem);
    font-weight: 600;
    color: #fff;
    line-height: 1.12;
    letter-spacing: -.03em;
    margin-bottom: 18px;
    animation: fadeUp .6s var(--ease) .2s both;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--coral);
    background: linear-gradient(90deg, #FF5A5F, #ff9a6c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    font-size: 1.05rem;
    color: rgba(255,255,255,.58);
    max-width: 480px;
    margin: 0 auto 40px;
    line-height: 1.7;
    animation: fadeUp .6s var(--ease) .3s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SEARCH BAR ── */
  .search-wrap {
    animation: fadeUp .6s var(--ease) .4s both;
  }
  .search-bar {
    display: flex;
    max-width: 580px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    padding: 7px 7px 7px 20px;
    box-shadow: 0 24px 64px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.05);
    gap: 8px;
    align-items: center;
    transition: box-shadow .3s;
  }
  .search-bar:focus-within {
    box-shadow: 0 24px 64px rgba(0,0,0,.4), 0 0 0 2px var(--coral);
  }
  .search-bar input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: .95rem;
    color: var(--ink);
    background: transparent;
    min-width: 0;
  }
  .search-bar input::placeholder { color: #9ca3af; }
  .search-bar button {
    background: var(--coral);
    color: #fff;
    border: none;
    border-radius: 11px;
    padding: 11px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: .875rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, transform .15s, box-shadow .2s;
    white-space: nowrap;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(255,90,95,.3);
  }
  .search-bar button:hover {
    background: var(--coral-d);
    transform: scale(1.03);
    box-shadow: 0 6px 18px rgba(255,90,95,.4);
  }

  /* Hero stats */
  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 40px;
    flex-wrap: wrap;
    animation: fadeUp .6s var(--ease) .5s both;
  }
  .stat-item {
    text-align: center;
  }
  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: #fff;
  }
  .stat-label {
    font-size: .72rem;
    color: rgba(255,255,255,.4);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .stat-divider {
    width: 1px;
    background: rgba(255,255,255,.1);
    align-self: stretch;
  }

  /* ── LISTINGS SECTION ── */
  .listings-section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 64px 32px;
  }
  .listings-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .listings-header h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.85rem;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -.02em;
  }
  .listings-count {
    font-size: .83rem;
    color: var(--muted);
    background: #f3f4f6;
    padding: 4px 12px;
    border-radius: 100px;
    transition: opacity .2s;
  }

  /* ── FILTERS ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }
  .filter-chip {
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: .8rem;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 100px;
    cursor: pointer;
    transition: all .18s var(--ease);
  }
  .filter-chip:hover {
    border-color: var(--coral);
    color: var(--coral);
    background: rgba(255,90,95,.05);
    transform: translateY(-1px);
  }
  .filter-chip.active {
    border-color: var(--coral);
    color: var(--coral);
    background: rgba(255,90,95,.08);
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(255,90,95,.15);
  }

  /* ── PG GRID ── */
  .pg-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
  }

  /* ── PG CARD ── */
  .pg-card {
    background: var(--card);
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: box-shadow .3s var(--ease), transform .3s var(--ease), border-color .3s;
    cursor: pointer;
    text-decoration: none;
    display: block;
    color: inherit;
    animation: cardIn .5s var(--ease) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .pg-card:hover {
    box-shadow: 0 16px 48px rgba(0,0,0,.12);
    transform: translateY(-5px);
    border-color: rgba(255,90,95,.2);
  }

  .pg-card-img-wrap {
    position: relative;
    height: 200px;
    overflow: hidden;
    background: linear-gradient(135deg, #f0ebe6 0%, #e8e2dc 100%);
  }
  .pg-card-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform .4s var(--ease);
  }
  .pg-card:hover .pg-card-img-wrap img { transform: scale(1.05); }

  .pg-card-img-placeholder {
    width: 100%; height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
    background: linear-gradient(135deg, #f0ebe6 0%, #e8e2dc 100%);
  }

  /* Image overlay on hover */
  .pg-card-img-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,.4) 0%, transparent 50%);
    opacity: 0;
    transition: opacity .3s;
  }
  .pg-card:hover .pg-card-img-wrap::after { opacity: 1; }

  .pg-card-badge {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(255,255,255,.95);
    backdrop-filter: blur(8px);
    font-size: .68rem;
    font-weight: 700;
    padding: 4px 11px;
    border-radius: 100px;
    color: #059669;
    letter-spacing: .05em;
    text-transform: uppercase;
    z-index: 1;
  }
  .pg-card-badge.unavail {
    background: rgba(0,0,0,.6);
    color: #fca5a5;
  }
  .pg-card-gender {
    position: absolute;
    top: 12px; right: 12px;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px);
    border-radius: 100px;
    padding: 4px 11px;
    font-size: .68rem;
    font-weight: 600;
    color: var(--ink);
    z-index: 1;
  }

  .pg-card-body { padding: 20px 22px 22px; }
  .pg-card-name {
    font-family: 'Fraunces', serif;
    font-size: 1.12rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pg-card-location {
    font-size: .82rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 14px;
  }
  .pg-card-location svg { flex-shrink: 0; }

  .pg-card-facilities {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .facility-tag {
    font-size: .72rem;
    font-weight: 500;
    color: var(--muted);
    background: #f3f4f6;
    padding: 3px 10px;
    border-radius: 100px;
    transition: background .2s, color .2s;
  }
  .pg-card:hover .facility-tag { background: rgba(255,90,95,.07); color: var(--coral); }

  .pg-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 14px;
    margin-top: auto;
  }
  .pg-card-price {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--ink);
  }
  .pg-card-price span {
    font-family: 'DM Sans', sans-serif;
    font-size: .78rem;
    font-weight: 400;
    color: var(--muted);
  }
  .btn-view {
    font-size: .8rem;
    font-weight: 600;
    color: var(--coral);
    background: rgba(255,90,95,.08);
    padding: 7px 16px;
    border-radius: 100px;
    text-decoration: none;
    transition: background .2s, color .2s, transform .15s;
    border: 1.5px solid rgba(255,90,95,.2);
  }
  .btn-view:hover {
    background: var(--coral);
    color: #fff;
    border-color: var(--coral);
    transform: translateX(2px);
  }

  /* ── SKELETON ── */
  .loading-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
  }
  .skeleton {
    background: var(--card);
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .skeleton-img { height: 200px; background: linear-gradient(90deg, #f0ede9 25%, #e8e4e0 50%, #f0ede9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  .skeleton-body { padding: 20px 22px 22px; }
  .skeleton-line { height: 13px; background: linear-gradient(90deg, #f0ede9 25%, #e8e4e0 50%, #f0ede9 75%); background-size: 200% 100%; border-radius: 7px; margin-bottom: 10px; animation: shimmer 1.5s infinite; }
  .skeleton-line.short { width: 50%; }
  .skeleton-line.med   { width: 72%; }
  @keyframes shimmer {
    from { background-position: 200% 0; }
    to   { background-position: -200% 0; }
  }

  /* ── EMPTY / ERROR ── */
  .empty-state, .error-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    grid-column: 1 / -1;
    animation: fadeUp .4s var(--ease);
  }
  .empty-state .icon, .error-state .icon { font-size: 3.5rem; margin-bottom: 16px; }
  .empty-state h3, .error-state h3 { font-family: 'Fraunces', serif; font-size: 1.35rem; color: var(--ink); margin-bottom: 8px; }
  .empty-state p, .error-state p { font-size: .9rem; }

  .retry-btn {
    margin-top: 18px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--coral);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 10px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: .875rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, transform .15s;
    box-shadow: 0 4px 12px rgba(255,90,95,.3);
  }
  .retry-btn:hover { background: var(--coral-d); transform: translateY(-1px); }


  @media (max-width: 600px) {
    .listings-section { padding: 40px 20px; }
    .hero { padding: 72px 20px 60px; }
    .search-bar { padding: 6px 6px 6px 16px; }
    .hero-stats { gap: 20px; }
    .stat-divider { display: none; }
  }
</style>
{% endblock %}

{% block content %}

<!-- ── HERO ── -->
<section class="hero">
  <div class="hero-dots"></div>
  <div class="hero-content">
    <div class="hero-eyebrow">Verified PGs across India</div>
    <h1>Find your <em>perfect</em><br>PG, stress-free.</h1>

    <div class="search-wrap">
      <div class="search-bar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search by city or locality…" autocomplete="off"/>
        <button id="searchBtn">Search</button>
      </div>
    </div>
  </div>
</section>


<!-- ── LISTINGS ── -->
<section class="listings-section">
  <div class="listings-header">
    <h2>Available PGs</h2>
    <span class="listings-count" id="listingsCount" style="opacity:0"></span>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-chip active" data-filter="all">All</button>
    <button class="filter-chip" data-filter="male">♂ Male</button>
    <button class="filter-chip" data-filter="female">♀ Female</button>
    <button class="filter-chip" data-filter="any">⚥ Co-living</button>
    <button class="filter-chip" data-filter="wifi">📶 WiFi</button>
    <button class="filter-chip" data-filter="food">🍽️ Food</button>
    <button class="filter-chip" data-filter="ac">❄️ AC</button>
  </div>

  <div id="pgContainer" class="loading-grid">
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line med"></div><div class="skeleton-line short"></div><div class="skeleton-line med"></div></div></div>
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line med"></div><div class="skeleton-line short"></div><div class="skeleton-line med"></div></div></div>
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line med"></div><div class="skeleton-line short"></div><div class="skeleton-line med"></div></div></div>
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line med"></div><div class="skeleton-line short"></div><div class="skeleton-line med"></div></div></div>
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line med"></div><div class="skeleton-line short"></div><div class="skeleton-line med"></div></div></div>
    <div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line med"></div><div class="skeleton-line short"></div><div class="skeleton-line med"></div></div></div>
  </div>
</section>

{% endblock %}

{% block extra_scripts %}
<script>
  const API_URL = '/api/v1/listings/';
  let allPGs = [];
  let activeFilter = 'all';
  let searchQuery = '';

  // ── Fetch ──
  async function fetchPGs() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allPGs = Array.isArray(data) ? data : (data.results || []);

      renderPGs();
    } catch (err) {
      console.error('Failed to fetch PGs:', err);
      document.getElementById('pgContainer').className = 'pg-grid';
      document.getElementById('pgContainer').innerHTML = `
        <div class="error-state">
          <div class="icon">⚠️</div>
          <h3>Couldn't load listings</h3>
          <p>Please check your connection or try again.</p>
          <button class="retry-btn" onclick="fetchPGs()">↺ Try Again</button>
        </div>`;
      document.getElementById('listingsCount').style.opacity = '0';
    }
  }

  function animateCount(id, target) {
    const el = document.getElementById(id);
    if (!el) return;
    let start = 0;
    const step = Math.ceil(target / 25);
    const timer = setInterval(() => {
      start = Math.min(start + step, target);
      el.textContent = start;
      if (start >= target) clearInterval(timer);
    }, 40);
  }

  // ── Render ──
  function renderPGs() {
    const query = searchQuery.toLowerCase();
    const filtered = allPGs.filter(pg => {
      const matchSearch = !query ||
        pg.name?.toLowerCase().includes(query) ||
        pg.location?.toLowerCase().includes(query) ||
        pg.city?.toLowerCase().includes(query);

      let matchFilter = true;
      if (activeFilter === 'male')   matchFilter = pg.gender_preference === 'male';
      else if (activeFilter === 'female') matchFilter = pg.gender_preference === 'female';
      else if (activeFilter === 'any')    matchFilter = pg.gender_preference === 'any';
      else if (activeFilter === 'wifi')   matchFilter = !!pg.wifi;
      else if (activeFilter === 'food')   matchFilter = !!pg.food;
      else if (activeFilter === 'ac')     matchFilter = !!pg.ac;

      return matchSearch && matchFilter;
    });

    const countEl = document.getElementById('listingsCount');
    if (filtered.length) {
      countEl.textContent = `${filtered.length} PG${filtered.length !== 1 ? 's' : ''} found`;
      countEl.style.opacity = '1';
    } else {
      countEl.style.opacity = '0';
    }

    const container = document.getElementById('pgContainer');
    container.className = 'pg-grid';

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">🔍</div>
          <h3>No PGs found</h3>
          <p>Try adjusting your search or removing some filters.</p>
        </div>`;
      return;
    }

    container.innerHTML = filtered.map((pg, i) => {
      const facilities = [];
      if (pg.wifi)    facilities.push('WiFi');
      if (pg.food)    facilities.push('Food');
      if (pg.laundry) facilities.push('Laundry');
      if (pg.ac)      facilities.push('AC');
      if (pg.parking) facilities.push('Parking');

      const genderLabel = { male: '♂ Male', female: '♀ Female', any: '⚥ Any' };
      const firstImage  = pg.images?.length > 0 ? pg.images[0].image : null;

      const imgHtml = firstImage
        ? `<img src="${esc(firstImage)}" alt="${esc(pg.name)}" loading="lazy">`
        : `<div class="pg-card-img-placeholder">🏠</div>`;

      return `
        <a class="pg-card" href="/pg/${pg.pg_id}/" style="animation-delay:${i * 60}ms">
          <div class="pg-card-img-wrap">
            ${imgHtml}
            <span class="pg-card-badge ${pg.is_available ? '' : 'unavail'}">
              ${pg.is_available ? '● Available' : '● Full'}
            </span>
            <span class="pg-card-gender">${genderLabel[pg.gender_preference] || ''}</span>
          </div>
          <div class="pg-card-body">
            <div class="pg-card-name">${esc(pg.name)}</div>
            <div class="pg-card-location">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="var(--coral)"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
              ${esc(pg.location)}, ${esc(pg.city)}
            </div>
            ${facilities.length ? `<div class="pg-card-facilities">${facilities.map(f => `<span class="facility-tag">${f}</span>`).join('')}</div>` : ''}
            <div class="pg-card-footer">
              <div class="pg-card-price">₹${Number(pg.rent).toLocaleString('en-IN')}<span>/mo</span></div>
              <span class="btn-view">View →</span>
            </div>
          </div>
        </a>`;
    }).join('');
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Search ──
  const searchInput = document.getElementById('searchInput');
  const searchBtn   = document.getElementById('searchBtn');

  searchBtn.addEventListener('click', () => {
    searchQuery = searchInput.value.trim();
    renderPGs();
  });
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { searchQuery = e.target.value.trim(); renderPGs(); }
  });

  // Live search with debounce
  let debounceTimer;
  searchInput.addEventListener('input', e => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { searchQuery = e.target.value.trim(); renderPGs(); }, 300);
  });

  // ── Filter chips ──
  document.getElementById('filterBar').addEventListener('click', e => {
    const chip = e.target.closest('.filter-chip');
    if (!chip) return;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    renderPGs();
  });

  fetchPGs();
</script>
{% endblock %}
